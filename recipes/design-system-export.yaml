# Design System Export Recipe
# Full pipeline from discovery to implementation-ready export package

name: design-system-export
version: "1.1.0"
description: |
  Complete design system generation pipeline. Takes a project through discovery,
  generates tokens and component specs, and produces an export package ready
  for coding agents to implement.

# Input context
context:
  project_description: ""  # Required: What are we building?
  components: "Button, Input, Card, Alert"  # List of components to spec (optional)
  framework: "both"  # Target framework - tailwind|css|both (optional)

steps:
  # Phase 1: Discovery
  # NOTE: This step delegates to discovery:discovery-interviewer, which requires
  # the Discovery bundle to be loaded (amplifier-bundle-discovery). If the
  # Discovery bundle is not available, skip this step and supply a discovery
  # brief manually as input to Phase 2 (direction).
  - id: discover
    agent: discovery:discovery-interviewer
    prompt: |
      Conduct design discovery for:
      
      {{project_description}}
      
      Focus on:
      - Purpose and intent (what problem does this solve?)
      - Target audience (who uses this?)
      - Visual direction (how should it feel?)
      - Constraints (accessibility, platforms, existing brand)
      
      Output a comprehensive Discovery Brief.
    output: discovery_brief

  # Phase 2: Design Direction
  - id: direction
    agent: design-intelligence:art-director
    prompt: |
      Based on this discovery brief, establish a design direction:
      
      {{discovery_brief}}
      
      Provide:
      1. Aesthetic Strategy (3-5 adjectives, what to embrace/avoid)
      2. Design Principles (3-5 guiding principles)
      3. Initial Recommendations:
         - Color direction (warm/cool, primary/secondary suggestions)
         - Typography direction (personality, font family suggestions)
         - Motion philosophy (subtle/expressive)
      4. Quality Baseline (what "done well" looks like)
    output: design_direction

  # Phase 3: Generate Tokens
  - id: tokens
    agent: design-intelligence:token-generator
    prompt: |
      Generate Design Protocol tokens based on:
      
      ## Discovery Brief
      {{discovery_brief}}
      
      ## Design Direction
      {{design_direction}}
      
      Produce complete tokens.json with:
      - Color tokens (primary, secondary, neutral scale, semantic)
      - Typography tokens (families, scale, weights)
      - Spacing tokens (base unit, scale)
      - Radius, shadow, motion tokens
      
      Also produce exports:
      - tokens.css (CSS custom properties)
      - tailwind.config.js (Tailwind configuration)
    output: token_output

  # Phase 3.5: Sync tokens to .design/ for context reconciliation
  #
  # WARNING: PIPELINE NOTE: The token-generator above writes tokens to
  # `design-system-export/tokens/tokens.json` (inside the export package).
  # That path is NOT watched by the design-context reconciler. To keep
  # .design/context.json current, this step extracts the token content and
  # writes it to `.design/tokens.json` -- the path the reconciler reads.
  #
  # If you skip or remove this step, context.json will NOT reflect these
  # tokens and downstream agents (art-director, spec-writer, etc.) will
  # see stale or missing token data when they read context.json.
  - id: sync-context
    agent: design-intelligence:design-context
    prompt: |
      The token-generator has produced a new token set. Before running your
      normal reconciliation, extract the tokens.json content from the output
      below and write it to `.design/tokens.json`.

      Then proceed with your full reconciliation process: read all `.design/`
      artifacts, extract structured data, merge into `.design/context.json`,
      and report any conflicts.

      Token generator output:
      {{token_output}}
    output: context_sync

  # Phase 4: Component Specs (if components requested)
  - id: components
    agent: design-intelligence:spec-writer
    prompt: |
      Write component specifications for: {{components}}
      
      Reference these tokens:
      {{token_output}}
      
      For each component, produce a Design Protocol spec with:
      - Variants and sizes
      - Props with types and defaults
      - Token references (not hardcoded values)
      - Accessibility requirements
      - Behavior descriptions
      - Usage examples
    output: component_specs

  # Phase 5: Export Package
  - id: export
    agent: design-intelligence:export-packager
    prompt: |
      Create a complete export package for coding agents.
      
      ## Tokens
      {{token_output}}
      
      ## Components
      {{component_specs}}
      
      ## Design Direction
      {{design_direction}}
      
      Target framework: {{framework}}
      
      Produce:
      1. README.md - Quick start guide
      2. Token files (CSS, Tailwind, SCSS)
      3. Component specs in JSON
      4. Implementation prompts for coding agents
      5. Usage examples
    output: export_package

# Output:
# Complete export package ready for implementation.
# The export-packager will produce all files needed to hand off to coding agents.
